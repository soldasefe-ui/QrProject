<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anı Duvarı ✨</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <div class="couple-frame">
        <img th:src="@{'/images/' + ${folderId} + '.jpg'}"
             onerror="this.src='https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=400';"
             class="couple-photo" alt="Couple">
    </div>
    <h1>
        <span th:text="${coupleName}">Çiftin İsimleri</span>
        <br>
        <span>Anı Albümü</span>
    </h1>
    <p class="subtitle">Anılarınızı bizimle paylaşın</p>

    <div th:if="${message}"
         style="background-color: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c3e6cb; text-align: center;">
        <strong th:text="${message}"></strong>
    </div>

    <div th:if="${error}"
         style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #f5c6cb; text-align: center;">
        <strong th:text="${error}"></strong>
    </div>

    <form th:action="@{/upload}" method="post" enctype="multipart/form-data" id="uploadForm">
        <input type="hidden" name="folderId" th:value="${folderId}">
        <input type="hidden" name="isim" th:value="${coupleName}">

        <div class="upload-card" onclick="document.getElementById('fileInput').click()">
            <svg class="camera-icon" viewBox="0 0 24 24">
                <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
            </svg>
            <p class="upload-text" id="fileText">Fotoğrafları Seç</p>
            <p class="upload-subtext">Anılar paylaştıkça çoğalır :))</p>

            <input type="file" name="files" id="fileInput" accept="image/*" multiple onchange="updateText(this)" style="display:none;">
        </div>

        <button type="submit" class="btn-submit">Albüme Gönder ✨</button>
    </form>

    <div id="loading" style="display: none;">
        <div class="spinner"></div>
        <p style="color: #4a3f35; font-size: 0.8rem;">Anılarınız bulutlara uçuyor...</p>
    </div>
</div>

<script>
    function updateText(input) {
        const fileText = document.getElementById('fileText');
        if (input.files.length > 0) {
            fileText.innerText = "✅ " + input.files.length + " fotoğraf seçildi";
        } else {
            fileText.innerText = 'Fotoğraf Seç';
        }
    }

    document.getElementById('uploadForm').onsubmit = function() {
        this.style.display = 'none';
        document.getElementById('loading').style.display = 'block';
    };
</script>

</body>
</html>
